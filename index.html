<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Key Verification</title>
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f5f5f5}
.box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.2);width:320px;text-align:center}
input,button{width:100%;padding:10px;margin:8px 0}
button{background:#2196F3;color:#fff;border:0;border-radius:5px}
</style>
</head>
<body>
<div class="box">
<h2>Enter Key</h2>
<input id="key" placeholder="Enter key">
<button onclick="verifyKey()">Verify</button>
<p id="result"></p>
</div>
<script>
const VALID_KEY="DEVIL123";
function verifyKey(){
const k=document.getElementById("key").value.trim();
if(k===VALID_KEY){
document.getElementById("result").textContent="✅ Verified";
window.location.href="success.html";
}else{
document.getElementById("result").textContent="❌ Invalid key";
}}
</script>
</body>
</html>
